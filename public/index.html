<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R_75 Decimal‑Sum Bot</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#0b0f14; color:#c9d1d9; }
  .container { max-width:700px; margin:30px auto; padding:20px; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .status-badge { padding:5px 15px; border-radius:20px; font-size:14px; font-weight:600; }
  .status-running { background:#1a7f37; color:#fff; } .status-stopped { background:#cf222e; color:#fff; } .status-locked { background:#6e7681; color:#fff; }
  .dashboard { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-bottom:25px; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:18px; }
  .card h3 { font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:#8b949e; margin-bottom:8px; }
  .value { font-size:28px; font-weight:600; } .green { color:#3fb950; } .red { color:#f85149; } .blue { color:#58a6ff; }
  .btn { padding:10px 25px; border:none; border-radius:6px; font-weight:600; cursor:pointer; }
  .btn-start { background:#238636; color:white; } .btn-stop { background:#da3633; color:white; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .log-container { background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:15px; margin-top:20px; }
  #logs { height:350px; overflow-y:auto; font-family:'Cascadia Code',monospace; font-size:13px; line-height:1.6; }
  .log-entry { padding:3px 0; border-bottom:1px solid #21262d; }
  .log-entry .time { color:#58a6ff; margin-right:10px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚡ R_75 Decimal‑Sum</h1>
    <span id="statusBadge" class="status-badge status-stopped">Stopped</span>
  </div>

  <div class="dashboard">
    <div class="card"><h3>Balance</h3><div class="value blue" id="balance">--</div></div>
    <div class="card"><h3>Daily P&L</h3><div class="value" id="dailyPnl">0.00</div></div>
    <div class="card"><h3>Take Profit</h3><div class="value green">$3.00</div></div>
    <div class="card"><h3>Stop Loss</h3><div class="value red">$5.00</div></div>
    <div class="card"><h3>Mode</h3><div class="value" id="modeDisplay">--</div></div>
    <div class="card"><h3>VL Count</h3><div class="value" id="vlDisplay">0</div></div>
  </div>

  <div style="margin:15px 0">
    <button class="btn btn-start" id="startBtn" onclick="start()">▶ Start</button>
    <button class="btn btn-stop" id="stopBtn" onclick="stop()" disabled>⏹ Stop</button>
  </div>

  <div class="log-container"><h2>Event Log</h2><div id="logs"></div></div>
</div>

<script>
const logsDiv = document.getElementById('logs');
const es = new EventSource('/api/logs');
es.onmessage = e => {
  const data = JSON.parse(e.data);
  if (data.state) updateUI(data.state);
  if (data.logs) {
    data.logs.forEach(l => {
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `<span class="time">${new Date(l.time).toLocaleTimeString()}</span>${l.message}`;
      logsDiv.appendChild(div);
    });
    logsDiv.scrollTop = logsDiv.scrollHeight;
  }
};

function updateUI(s) {
  document.getElementById('balance').textContent = s.balance ? `$${parseFloat(s.balance).toFixed(2)}` : '--';
  document.getElementById('dailyPnl').textContent = (s.dailyPnl>=0?'+':'')+s.dailyPnl.toFixed(2);
  document.getElementById('dailyPnl').className = 'value '+(s.dailyPnl>=0?'green':'red');
  document.getElementById('modeDisplay').textContent = s.mode||'--';
  document.getElementById('vlDisplay').textContent = s.virtualLosses||0;

  const badge = document.getElementById('statusBadge');
  if (s.locked) { badge.textContent='Locked'; badge.className='status-badge status-locked'; }
  else if (s.active) { badge.textContent='Running'; badge.className='status-badge status-running'; }
  else { badge.textContent='Stopped'; badge.className='status-badge status-stopped'; }

  document.getElementById('startBtn').disabled = s.active || s.locked || s.sessionAlreadyUsedToday;
  document.getElementById('stopBtn').disabled = !s.active;
}

function start(){ fetch('/api/control',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'start'})}); }
function stop(){ fetch('/api/control',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'stop'})}); }
</script>
</body>
</html>
